<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apple ][ Lode Runner (Phaser 3 clone)</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100%;
        }

        #game {
            width: 100%;
            height: 100%;
            display: flex;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .help {
            position: fixed;
            left: 12px;
            bottom: 12px;
            color: #9ff;
            font-family: monospace;
            font-size: 16px;
        }

        .help kbd {
            background: #111;
            border: 1px solid #355;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="game"></div>

    <div class="help">
        Move <kbd>←</kbd><kbd>→</kbd> |
        Climb <kbd>↑</kbd><kbd>↓</kbd> |
        Dig <kbd>Z</kbd>/<kbd>X</kbd> |
        Restart <kbd>R</kbd>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
